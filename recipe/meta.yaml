{% set name = "dp-accounting" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 0bd8c92a2d0f3f250106167fe8656b42d68707a363c75a708d383a52ad9ef5d6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - absl-py >=1.0,<2.dev0
    - attrs >=22,<24
    - dm-tree >=0.1.8,<0.2.dev0
    - mpmath >=1.2,<2.dev0
    - numpy >=1.21,<3.0
    - scipy >=1.7,<2.dev0

test:
  imports:
    - dp_accounting
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/google/differential-privacy/
  summary: Tools for tracking differential privacy budgets
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rpreen
